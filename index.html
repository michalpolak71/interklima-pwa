<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="INTERKLIMA">
<meta name="theme-color" content="#0F1923">
<title>INTERKLIMA Produkcja</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0F1923;--card:#1B2838;--card2:#1B3A5C;--green:#4CAF50;--red:#E53935;--orange:#FFA726;--blue:#4FC3F7;--text:#fff;--text2:rgba(255,255,255,.7);--text3:rgba(255,255,255,.38)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.app{max-width:480px;margin:0 auto;padding:16px 20px;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 16px}
.header h1{font-size:16px;font-weight:600}
.menu-btn{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:8px;-webkit-tap-highlight-color:transparent}
.logo-wrap{text-align:center;padding:8px 0 20px}
.logo-wrap img{height:60px;opacity:.9}
.status-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:12px;font-size:13px;font-weight:600;margin:0 auto 28px}
.status-badge.in{background:rgba(76,175,80,.15);color:var(--green);border:1px solid rgba(76,175,80,.3)}
.status-badge.out{background:rgba(255,167,38,.15);color:var(--orange);border:1px solid rgba(255,167,38,.3)}
.status-badge.off{background:rgba(233,57,53,.15);color:var(--red);border:1px solid rgba(233,57,53,.3)}
.status-badge.loading{background:rgba(255,255,255,.05);color:var(--text3);border:1px solid rgba(255,255,255,.1)}
.timer-card{background:var(--card);border-radius:20px;padding:28px 24px;text-align:center;margin-bottom:32px}
.timer-card.working{box-shadow:0 0 40px rgba(76,175,80,.15)}
.timer-card.break{box-shadow:0 0 40px rgba(255,167,38,.15)}
.state-label{font-size:12px;font-weight:600;letter-spacing:3px;margin-bottom:12px}
.state-label.idle{color:var(--text3)}.state-label.working{color:var(--green)}.state-label.break{color:var(--orange)}
.timer{font-family:'Courier New',monospace;font-size:48px;font-weight:300;letter-spacing:4px}
.timer.idle{color:var(--text3)}
.break-box{background:rgba(255,167,38,.12);border-radius:10px;padding:8px 16px;margin-top:12px;text-align:center}
.break-box .bt{font-family:'Courier New',monospace;font-size:22px;font-weight:600;color:var(--orange)}
.break-box .bi{font-size:11px;color:var(--text3);margin-top:4px}.break-box .bi.w{color:#ef5350}
.actions{display:flex;flex-direction:column;gap:12px}
.btn{width:100%;border:none;border-radius:16px;font-family:inherit;font-weight:700;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn.big{height:68px;font-size:17px}.btn.sm{height:50px;font-size:14px}
.btn.green{background:var(--green);color:#fff}.btn.red{background:var(--red);color:#fff}.btn.orange{background:var(--orange);color:#fff}.btn.blue{background:var(--blue);color:#000}
.btn:disabled{opacity:.4}
.spin{text-align:center;padding:24px}.spin p{color:var(--text3);margin-top:10px;font-size:13px}
.spin .d{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--blue);margin:0 3px;animation:b .6s infinite alternate}
.spin .d:nth-child(2){animation-delay:.2s}.spin .d:nth-child(3){animation-delay:.4s}
@keyframes b{to{transform:translateY(-10px);opacity:.3}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--card);z-index:101;transform:translateX(-100%);transition:transform .3s;display:flex;flex-direction:column;overflow-y:auto}
.overlay.open .panel{transform:translateX(0)}
.panel-hdr{background:linear-gradient(135deg,var(--card2),var(--bg));padding:48px 20px 20px}
.panel-hdr img{height:40px;margin-bottom:10px}.panel-hdr p{color:var(--text2);font-size:13px}
.mi{display:flex;align-items:center;gap:14px;padding:14px 20px;color:var(--text);font-size:14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;-webkit-tap-highlight-color:transparent}
.mi:active{background:rgba(255,255,255,.05)}
.mi i{font-style:normal;font-size:18px;width:24px;text-align:center;opacity:.6}
.divider{height:1px;background:rgba(255,255,255,.08);margin:4px 0}
.scr{display:none;flex-direction:column;flex:1}.scr.on{display:flex}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 0 16px}
.topbar button{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px 8px;-webkit-tap-highlight-color:transparent}
.topbar h2{font-size:16px;font-weight:600}
.inp{width:100%;background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none}
.inp:focus{border-color:var(--blue)}
.inp.big{font-size:18px;font-family:'Courier New',monospace;padding:14px 16px;border-radius:12px}
select.inp option{background:var(--card)}
textarea.inp{min-height:80px;resize:vertical}
.lbl{display:block;color:var(--text2);font-size:13px;font-weight:600;margin-bottom:6px}
.fg{margin-bottom:16px}
.crd{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.crd-b{border:1px solid rgba(255,255,255,.06)}
.dlg-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.dlg-ov.open{display:flex}
.dlg{background:var(--card);border-radius:16px;padding:24px;max-width:340px;width:100%}
.dlg h3{font-size:16px;margin-bottom:10px}.dlg p{color:var(--text2);font-size:14px;margin-bottom:18px}
.dlg-b{display:flex;gap:10px;justify-content:flex-end}
.dlg-b button{background:none;border:none;color:var(--blue);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;padding:8px 14px;border-radius:8px}
.dlg-b button.dng{color:var(--red)}
.tst{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.tst.show{opacity:1}.tst.ok{background:rgba(76,175,80,.9);color:#fff}.tst.err{background:rgba(233,57,53,.9);color:#fff}
.hrs-big{text-align:center;padding:20px;background:var(--card);border-radius:20px;margin-bottom:20px}
.hrs-n{font-family:'Courier New',monospace;font-size:32px;font-weight:700}
.hrs-bar{height:10px;border-radius:5px;background:rgba(255,255,255,.08);margin:14px 0 6px;overflow:hidden}
.hrs-fill{height:100%;border-radius:5px}
.sr{display:flex;gap:10px;margin-bottom:10px}
.sc{flex:1;background:var(--card);border-radius:12px;padding:14px;text-align:center}
.sc .v{font-size:20px;font-weight:700;margin:6px 0 2px}.sc .l{font-size:11px;color:var(--text3)}
.wk{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.wk:active{background:var(--card2)}
.pk{background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.pk-i{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
</style>
</head>
<body>
<div class="app">
<div class="scr on" id="s-main">
  <div class="header"><button class="menu-btn" onclick="openMenu()">&#9776;</button><h1 id="hdr-ph">INTERKLIMA</h1><div style="width:40px"></div></div>
  <div class="logo-wrap"><img src="logo.png" alt="" onerror="this.style.display='none'"></div>
  <div style="text-align:center"><div class="status-badge loading" id="gps-b"><span id="gps-t">Sprawdzanie...</span></div></div>
  <div class="timer-card" id="tc"><div class="state-label idle" id="sl">GOTOWY</div><div class="timer idle" id="tm">00:00:00</div><div id="brk" style="display:none"><div class="break-box"><span>&#9749;</span> <span class="bt" id="bt">00:00</span><div class="bi" id="bi">P&#322;atna przerwa: do 30 min</div></div></div></div>
  <div class="actions" id="act"></div>
</div>
<div class="scr" id="s-set"><div class="topbar"><button onclick="showS('main')">&#8592;</button><h2>Ustawienia</h2></div><label class="lbl">Numer telefonu:</label><p style="color:var(--text3);font-size:12px;margin-bottom:14px">Identyfikator w systemie</p><input type="tel" class="inp big" id="ph-in" placeholder="np. 608651538" maxlength="12" inputmode="numeric"><div style="height:16px"></div><button class="btn big green" id="sv-btn" onclick="savePh()">ZAPAMI&#280;TAJ</button><div id="sv-msg" style="display:none;background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.25);border-radius:10px;padding:10px;margin-top:14px;color:var(--green);font-size:12px">&#9989; Zapisano</div><div style="flex:1"></div><p style="text-align:center;color:var(--text3);font-size:11px;padding:16px">v1.4.0 PWA</p></div>
<div class="scr" id="s-hol"><div class="topbar"><button onclick="showS('main')">&#8592;</button><h2>Dni wolne 2026</h2></div><div id="hol-l"></div></div>
<div class="scr" id="s-lv"><div class="topbar"><button onclick="showS('main')">&#8592;</button><h2>Wniosek urlopowy</h2></div><div class="fg"><label class="lbl">Typ</label><select class="inp" id="lv-t"><option>Urlop wypoczynkowy</option><option>Na &#380;&#261;danie</option><option>Okoliczno&#347;ciowy</option><option>Bezp&#322;atny</option><option>Zwolnienie lekarskie</option><option>Opieka nad dzieckiem</option><option>Inny</option></select></div><div class="fg"><label class="lbl">Od</label><input type="date" class="inp" id="lv-f"></div><div class="fg"><label class="lbl">Do</label><input type="date" class="inp" id="lv-to"></div><div class="fg"><label class="lbl">Uwagi</label><textarea class="inp" id="lv-n" placeholder="Opcjonalnie..."></textarea></div><button class="btn big green" onclick="sendLv()">WY&#346;LIJ WNIOSEK</button></div>
<div class="scr" id="s-mlv"><div class="topbar"><button onclick="showS('main')">&#8592;</button><h2>Moje wnioski</h2><button onclick="ldMlv()" style="margin-left:auto">&#8635;</button></div><div id="mlv-l"></div></div>
<div class="scr" id="s-mhr"><div class="topbar"><button onclick="showS('main')">&#8592;</button><h2>Moje godziny</h2><button onclick="ldMhr()" style="margin-left:auto">&#8635;</button></div><div id="mhr-c"></div></div>
<div class="scr" id="s-apr"><div class="topbar"><button onclick="showS('main')">&#8592;</button><h2>Urlopy</h2><button onclick="ldApr()" style="margin-left:auto">&#8635;</button></div><div id="apr-l"></div></div>
<div class="scr" id="s-wkr"><div class="topbar"><button onclick="showS('main')">&#8592;</button><h2>Pracownicy</h2></div><div id="wkr-l"></div></div>
<div class="scr" id="s-pkg"><div class="topbar"><button onclick="showS('wkr')">&#8592;</button><h2 id="pkg-t">Pracownik</h2><button onclick="ldPkg(cPh,cNm)" style="margin-left:auto">&#8635;</button></div><div id="pkg-l"></div></div>
</div>
<div class="overlay" id="ov" onclick="closeMenu()"><div class="panel" onclick="event.stopPropagation()">
  <div class="panel-hdr"><img src="logo.png" alt="" onerror="this.style.display='none'"><p>Dzia&#322; Produkcja</p></div>
  <button class="mi" onclick="closeMenu();showS('lv')"><i>&#127958;</i>Wniosek urlopowy</button>
  <button class="mi" onclick="closeMenu();showS('mlv');ldMlv()"><i>&#128203;</i>Moje wnioski</button>
  <button class="mi" onclick="closeMenu();showS('mhr');ldMhr()"><i>&#9202;</i>Moje godziny</button>
  <button class="mi" onclick="closeMenu();showS('hol')"><i>&#128197;</i>Dni wolne 2026</button>
  <div class="divider"></div>
  <button class="mi" id="m-apr" style="display:none" onclick="closeMenu();showS('apr');ldApr()"><i>&#9989;</i>Zatwierdzanie urlop&#243;w</button>
  <button class="mi" id="m-wkr" style="display:none" onclick="closeMenu();showS('wkr');ldWkr()"><i>&#128101;</i>Lokalizacja pracownik&#243;w</button>
  <div class="divider"></div>
  <button class="mi" onclick="closeMenu();showS('set')"><i>&#9881;</i>Ustawienia</button>
</div></div>
<div class="dlg-ov" id="dov"><div class="dlg"><h3 id="dt"></h3><p id="dm"></p><div class="dlg-b" id="db"></div></div></div>
<div class="tst" id="tst"></div>
<script>
const W='https://script.google.com/macros/s/AKfycbw_1NLFIFbJxxS7Pco1V3ZfD5zihnqAUJDTM-p-les9yX5FzymXOTB-Fxid0c4vrf-18Q/exec';
const FL=52.236189,FN=20.839213,AR=300,AP=['795561356','608651538','690205199'];
let st='idle',sT=null,bT=null,bMs=0,ph='',tI=null,pI=null,gI=null,lI=null,cPh='',cNm='';
function init(){
  ph=localStorage.getItem('ik_ph')||'';
  if(ph){document.getElementById('hdr-ph').textContent=ph;document.getElementById('ph-in').value=ph;if(AP.includes(ph)){document.getElementById('m-apr').style.display='';document.getElementById('m-wkr').style.display='';}}
  const ss=localStorage.getItem('ik_st'),s=localStorage.getItem('ik_s'),bm=parseInt(localStorage.getItem('ik_bm')||'0'),bs=localStorage.getItem('ik_bs');
  if(ss&&s){sT=new Date(s);bMs=bm;if(ss==='w'){st='working';wkTm();sPing();}else if(ss==='b'){st='onBreak';bT=bs?new Date(bs):new Date();bkTm();}}
  if(!ph)showS('set');uUI();rGPS();gI=setInterval(rGPS,60000);lI=setInterval(chkLv,300000);setTimeout(chkLv,10000);rHol();
}
function svSt(){localStorage.setItem('ik_st',st==='working'?'w':st==='onBreak'?'b':'i');if(sT)localStorage.setItem('ik_s',sT.toISOString());else localStorage.removeItem('ik_s');localStorage.setItem('ik_bm',bMs.toString());if(bT)localStorage.setItem('ik_bs',bT.toISOString());else localStorage.removeItem('ik_bs');}
function showS(n){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById('s-'+n).classList.add('on');}
function openMenu(){document.getElementById('ov').classList.add('open');}
function closeMenu(){document.getElementById('ov').classList.remove('open');}
async function gPos(){return new Promise((r,j)=>{if(!navigator.geolocation){j('GPS');return;}navigator.geolocation.getCurrentPosition(p=>r({lat:p.coords.latitude,lon:p.coords.longitude}),e=>j(e.message),{enableHighAccuracy:true,timeout:15000});});}
function hav(a,b,c,d){const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z));}
async function rGPS(){const b=document.getElementById('gps-b'),t=document.getElementById('gps-t');try{const p=await gPos();if(hav(FL,FN,p.lat,p.lon)<=AR){b.className='status-badge in';t.textContent='W firmie \u2713';}else{b.className='status-badge out';t.textContent='Poza firm\u0105 \u26A0';}}catch(e){b.className='status-badge off';t.textContent='GPS niedost\u0119pny';}}
async function sWh(type,lat,lon,ex){const n=new Date(),dd=String(n.getDate()).padStart(2,'0'),mm=String(n.getMonth()+1).padStart(2,'0'),hh=String(n.getHours()).padStart(2,'0'),mi=String(n.getMinutes()).padStart(2,'0');try{await fetch(W,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({date:dd+'.'+mm+'.'+n.getFullYear(),time:hh+':'+mi,phone:ph,type,lat:String(lat),lon:String(lon),...ex})});return true;}catch(e){return false;}}
async function fGet(p){try{const r=await fetch(W+'?'+p,{redirect:'follow',mode:'cors'});if(r.ok)return await r.text();return null;}catch(e){return null;}}
async function doStart(){if(!ph){tst('Wpisz numer','err');return;}uUI('ld');try{let p;try{p=await gPos();}catch(e){p={lat:0,lon:0};}await sWh('START',p.lat,p.lon);sT=new Date();bMs=0;bT=null;st='working';svSt();wkTm();sPing();rGPS();tst('Praca rozpocz\u0119ta \u2713','ok');}catch(e){tst('B\u0142\u0105d','err');}uUI();}
async function doStop(){dlg('Zako\u0144czy\u0107?','Czas: '+fEl(),[{t:'Nie',a:()=>cDlg()},{t:'Tak',c:'dng',a:async()=>{cDlg();uUI('ld');try{let p;try{p=await gPos();}catch(e){p={lat:0,lon:0};}await sWh('STOP',p.lat,p.lon);clearInterval(tI);clearInterval(pI);st='idle';sT=null;bMs=0;bT=null;svSt();rGPS();tst('Zako\u0144czono \u2713','ok');}catch(e){tst('B\u0142\u0105d','err');}uUI();}}]);}
async function doBrk(){uUI('ld');try{let p;try{p=await gPos();}catch(e){p={lat:0,lon:0};}await sWh('PRZERWA',p.lat,p.lon);bT=new Date();st='onBreak';clearInterval(pI);svSt();bkTm();tst('Przerwa','ok');}catch(e){tst('B\u0142\u0105d','err');}uUI();}
async function doEnd(){uUI('ld');try{let p;try{p=await gPos();}catch(e){p={lat:0,lon:0};}await sWh('KONIEC_PRZERWY',p.lat,p.lon);if(bT)bMs+=(Date.now()-bT.getTime());bT=null;st='working';svSt();wkTm();sPing();rGPS();tst('Koniec przerwy \u2713','ok');}catch(e){tst('B\u0142\u0105d','err');}uUI();}
function wkTm(){clearInterval(tI);tI=setInterval(()=>{document.getElementById('tm').textContent=fEl();},1000);uUI();}
function bkTm(){clearInterval(tI);tI=setInterval(()=>{document.getElementById('tm').textContent=fEl();if(bT){const s=Math.floor((Date.now()-bT.getTime())/1000);document.getElementById('bt').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');const i=document.getElementById('bi');if(s>=1800){i.textContent='\u26A0 Przekroczono 30 min';i.className='bi w';}else{i.textContent='P\u0142atna przerwa: do 30 min';i.className='bi';}}},1000);uUI();}
function fEl(){if(!sT)return'00:00:00';let ms=Date.now()-sT.getTime()-bMs;if(st==='onBreak'&&bT)ms-=(Date.now()-bT.getTime());if(ms<0)ms=0;const s=Math.floor(ms/1000);return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function sPing(){clearInterval(pI);pI=setInterval(async()=>{if(st==='working'&&ph){try{const p=await gPos();await sWh('PING',p.lat,p.lon);}catch(e){}}},3600000);}
async function chkLv(){if(!ph)return;try{const t=await fGet('action=CHECK_URLOP&phone='+ph);if(t&&t.includes('"notification"')){const d=JSON.parse(t);if(d.notification&&d.notification.length>0)dlg('Wniosek urlopowy',d.notification,[{t:'OK',a:()=>cDlg()}]);}}catch(e){}}
function uUI(m){const a=document.getElementById('act'),tc=document.getElementById('tc'),sl=document.getElementById('sl'),te=document.getElementById('tm'),bk=document.getElementById('brk');
  if(m==='ld'){a.innerHTML='<div class="spin"><span class="d"></span><span class="d"></span><span class="d"></span><p>Wysy\u0142anie...</p></div>';return;}te.textContent=fEl();
  if(st==='idle'){tc.className='timer-card';sl.className='state-label idle';sl.textContent='GOTOWY';te.className='timer idle';bk.style.display='none';a.innerHTML='<button class="btn big green" onclick="doStart()">&#9654; START PRACY</button>';}
  else if(st==='working'){tc.className='timer-card working';sl.className='state-label working';sl.textContent='W PRACY';te.className='timer';bk.style.display='none';a.innerHTML='<button class="btn big red" onclick="doStop()">&#9632; STOP PRACY</button><button class="btn sm orange" onclick="doBrk()">&#10074;&#10074; PRZERWA</button>';}
  else if(st==='onBreak'){tc.className='timer-card break';sl.className='state-label break';sl.textContent='PRZERWA';te.className='timer';bk.style.display='';a.innerHTML='<button class="btn big orange" onclick="doEnd()">&#9654; KONIEC PRZERWY</button><button class="btn sm red" onclick="doStop()">&#9632; STOP PRACY</button>';}}
function savePh(){const v=document.getElementById('ph-in').value.replace(/\D/g,'').trim();if(v.length<9){tst('Min 9 cyfr','err');return;}if(st!=='idle'){tst('Nie w trakcie pracy','err');return;}ph=v;localStorage.setItem('ik_ph',ph);document.getElementById('hdr-ph').textContent=ph;document.getElementById('sv-btn').textContent='ZAPISANO \u2713';document.getElementById('sv-btn').style.background='#2e7d32';document.getElementById('sv-msg').style.display='block';if(AP.includes(ph)){document.getElementById('m-apr').style.display='';document.getElementById('m-wkr').style.display='';}tst('Zapisano','ok');}
function rHol(){const h=[{d:'2026-01-01',n:'Nowy Rok',x:'1 Sty, Czw'},{d:'2026-01-06',n:'Trzech Kr\u00f3li',x:'6 Sty, Wt'},{d:'2026-04-05',n:'Wielkanoc',x:'5 Kwi, Ndz'},{d:'2026-04-06',n:'Pon. Wielkanocny',x:'6 Kwi, Pon'},{d:'2026-05-01',n:'\u015awi\u0119to Pracy',x:'1 Maj, Pt'},{d:'2026-05-03',n:'Konstytucja',x:'3 Maj, Ndz'},{d:'2026-05-14',n:'Zielone \u015awi\u0105tki',x:'14 Maj, Czw'},{d:'2026-06-04',n:'Bo\u017ce Cia\u0142o',x:'4 Cze, Czw'},{d:'2026-08-15',n:'Wniebowzi\u0119cie',x:'15 Sie, Sob'},{d:'2026-11-01',n:'Wszystkich \u015awi\u0119tych',x:'1 Lis, Ndz'},{d:'2026-11-11',n:'Niepodleg\u0142o\u015b\u0107',x:'11 Lis, \u015ar'},{d:'2026-12-25',n:'Bo\u017ce Narodzenie',x:'25 Gru, Pt'},{d:'2026-12-26',n:'2. dzie\u0144 \u015awi\u0105t',x:'26 Gru, Sob'}];const td=new Date().toISOString().split('T')[0];let o='';h.forEach(i=>{const p=i.d<td;o+=`<div style="display:flex;align-items:center;gap:14px;background:var(--card);border-radius:12px;padding:12px 16px;margin-bottom:8px;${p?'opacity:.4':''}"><div style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;${p?'background:rgba(255,255,255,.04);color:var(--text3)':'background:rgba(233,57,53,.12);color:#ef5350'}">${i.d.split('-')[2]*1}</div><div><div style="font-weight:600;font-size:14px">${i.n}</div><div style="color:var(--text3);font-size:12px">${i.x}</div></div></div>`;});document.getElementById('hol-l').innerHTML=o;}
async function sendLv(){if(!ph){tst('Wpisz numer','err');return;}const t=document.getElementById('lv-t').value,f=document.getElementById('lv-f').value,to=document.getElementById('lv-to').value,n=document.getElementById('lv-n').value;if(!f||!to){tst('Wpisz daty','err');return;}try{const p=await gPos().catch(()=>({lat:0,lon:0}));await sWh('URLOP',p.lat,p.lon,{urlop_typ:t,urlop_od:f,urlop_do:to,urlop_uwagi:n,urlop_dni:Math.max(1,Math.ceil((new Date(to)-new Date(f))/86400000)+1)});tst('Wys\u0142ano \u2713','ok');showS('main');}catch(e){tst('B\u0142\u0105d','err');}}
async function ldMlv(){const l=document.getElementById('mlv-l');l.innerHTML='<div class="spin"><span class="d"></span><span class="d"></span><span class="d"></span></div>';const t=await fGet('action=MOJE_URLOPY&phone='+ph);if(!t||!t.includes('"requests"')){l.innerHTML='<p style="color:var(--text3);text-align:center;padding:40px">Brak</p>';return;}const d=JSON.parse(t);if(!d.requests||!d.requests.length){l.innerHTML='<p style="color:var(--text3);text-align:center;padding:40px">Brak wniosk\u00f3w</p>';return;}let o='';d.requests.reverse().forEach(r=>{const s=(r.status||'NOWY').toUpperCase();let c='var(--orange)',i='\u23F3';if(s.includes('ZATW')){c='var(--green)';i='\u2705';}if(s.includes('ODRZ')){c='var(--red)';i='\u274C';}o+=`<div class="crd crd-b" style="border-color:${c}30"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:${c};font-weight:700;font-size:13px">${i} ${s}</span><span style="color:var(--text3);font-size:11px">${r.data||''}</span></div><div style="font-weight:600">${r.typ||''}</div><div style="color:var(--text2);font-size:13px;margin-top:4px">${r.od||''} - ${r.do||''} (${r.dni||'?'} dni)</div></div>`;});l.innerHTML=o;}
async function ldMhr(){const c=document.getElementById('mhr-c');c.innerHTML='<div class="spin"><span class="d"></span><span class="d"></span><span class="d"></span></div>';const t=await fGet('action=MOJE_GODZINY&phone='+ph);if(!t||!t.includes('"hours"')){c.innerHTML='<p style="color:var(--text3);text-align:center;padding:40px">Brak</p>';return;}const d=JSON.parse(t),h=d.hours||0,tg=d.target||0,dy=d.days||0,wd=d.workDays||0,pct=tg>0?Math.min(100,Math.round(h/tg*100)):0,g=h>=tg*0.9,cl=g?'var(--green)':'var(--orange)',mn=['','Stycze\u0144','Luty','Marzec','Kwiecie\u0144','Maj','Czerwiec','Lipiec','Sierpie\u0144','Wrzesie\u0144','Pa\u017adziernik','Listopad','Grudzie\u0144'];c.innerHTML=`<p style="text-align:center;color:var(--text3);font-size:14px;letter-spacing:2px;margin-bottom:16px">${mn[d.month||0]||''}</p><div class="hrs-big"><div class="hrs-n" style="color:${cl}">${h.toFixed(1)} / ${tg} h</div><div class="hrs-bar"><div class="hrs-fill" style="width:${pct}%;background:${cl}"></div></div><div style="color:${cl};font-size:13px">${pct}%</div></div><div class="sr"><div class="sc"><div class="v">${dy}</div><div class="l">Przepracowane</div></div><div class="sc"><div class="v">${wd}</div><div class="l">Robocze</div></div></div><div class="sr"><div class="sc"><div class="v">${h.toFixed(1)}h</div><div class="l">Godziny</div></div><div class="sc"><div class="v">${Math.max(0,tg-h).toFixed(1)}h</div><div class="l">Pozosta\u0142o</div></div></div>`;}
async function ldApr(){const l=document.getElementById('apr-l');l.innerHTML='<div class="spin"><span class="d"></span><span class="d"></span><span class="d"></span></div>';const t=await fGet('action=LIST_URLOPY');if(!t||!t.includes('"requests"')){l.innerHTML='<p style="color:var(--text3);text-align:center;padding:40px">Brak</p>';return;}const d=JSON.parse(t);if(!d.requests||!d.requests.length){l.innerHTML='<p style="color:var(--text3);text-align:center;padding:40px">Brak wniosk\u00f3w</p>';return;}let o='';d.requests.forEach(r=>{const s=(r.status||'NOWY').toUpperCase(),nw=s==='NOWY',sc=s.includes('ZATW')?'zatwierdzony':s.includes('ODRZ')?'odrzucony':'nowy',scl=sc==='zatwierdzony'?'rgba(76,175,80,.15);color:var(--green)':sc==='odrzucony'?'rgba(233,57,53,.15);color:var(--red)':'rgba(255,167,38,.15);color:var(--orange)';o+=`<div class="crd crd-b" ${nw?'style="border-color:rgba(255,167,38,.3)"':''}><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-weight:700;font-size:15px">${r.pracownik||'?'}</span><span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;background:${scl}">${s}</span></div><div style="color:var(--text2);font-size:12px">&#128197; ${r.typ||''}</div><div style="color:var(--text2);font-size:12px">&#128198; ${r.od||''} - ${r.do||''}</div>${nw?`<div style="display:flex;gap:10px;margin-top:12px"><button class="btn sm green" onclick="apLv(${r.row},'ZATWIERDZONY')">&#10003; ZATWIERD\u0179</button><button class="btn sm red" onclick="apLv(${r.row},'ODRZUCONY')">&#10007; ODRZU\u0106</button></div>`:''}</div>`;});l.innerHTML=o;}
async function apLv(row,s){try{await fGet('action=UPDATE_URLOP&row='+row+'&status='+s);tst(s,'ok');ldApr();}catch(e){tst('B\u0142\u0105d','err');}}
async function ldWkr(){const l=document.getElementById('wkr-l');l.innerHTML='<div class="spin"><span class="d"></span><span class="d"></span><span class="d"></span></div>';const t=await fGet('action=LISTA_PRACOWNIKOW');if(!t||!t.includes('"workers"')){l.innerHTML='<p style="color:var(--text3);text-align:center;padding:40px">Brak</p>';return;}const d=JSON.parse(t);let o='';d.workers.forEach(w=>{o+=`<div class="wk" onclick="ldPkg('${w.phone}','${w.name}')"><div style="width:40px;height:40px;border-radius:12px;background:var(--card2);display:flex;align-items:center;justify-content:center">&#128100;</div><div><div style="font-weight:600;font-size:14px">${w.name}</div><div style="color:var(--text3);font-size:12px">${w.phone}</div></div><div style="margin-left:auto;color:var(--text3)">&#8250;</div></div>`;});l.innerHTML=o;}
async function ldPkg(p,n){cPh=p;cNm=n;document.getElementById('pkg-t').textContent=n;showS('pkg');const l=document.getElementById('pkg-l');l.innerHTML='<div class="spin"><span class="d"></span><span class="d"></span><span class="d"></span></div>';const t=await fGet('action=PINGI&phone='+p);if(!t||!t.includes('"pings"')){l.innerHTML='<p style="color:var(--text3);text-align:center;padding:40px">Brak</p>';return;}const d=JSON.parse(t);if(!d.pings||!d.pings.length){l.innerHTML='<p style="color:var(--text3);text-align:center;padding:40px">Brak danych</p>';return;}let o='';d.pings.forEach(p=>{let c='var(--blue)',i='&#128205;';if(p.type==='START'){c='var(--green)';i='&#9654;';}else if(p.type==='STOP'||p.type==='STOP_AUTO'){c='var(--red)';i='&#9632;';}else if(p.alert){c='var(--orange)';}o+=`<div class="pk"><div class="pk-i" style="background:${c}20;color:${c}">${i}</div><div><div style="display:flex;gap:8px;align-items:center"><span style="font-weight:700;font-size:12px;color:${c}">${p.type}</span><span style="color:var(--text2);font-size:12px">${p.date} ${p.time}</span></div>${p.alert?'<div style="color:var(--orange);font-size:11px">'+p.alert+'</div>':''}</div></div>`;});l.innerHTML=o;}
function dlg(ti,ms,bt){document.getElementById('dt').textContent=ti;document.getElementById('dm').textContent=ms;const c=document.getElementById('db');c.innerHTML='';bt.forEach(b=>{const e=document.createElement('button');e.textContent=b.t;if(b.c)e.className=b.c;e.onclick=b.a;c.appendChild(e);});document.getElementById('dov').classList.add('open');}
function cDlg(){document.getElementById('dov').classList.remove('open');}
function tst(m,t){const e=document.getElementById('tst');e.textContent=m;e.className='tst '+t+' show';setTimeout(()=>e.classList.remove('show'),3000);}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
